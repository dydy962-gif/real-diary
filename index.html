<style>
:root{--bg:#0a0e1a;--bg2:#0f1628;--bg3:#141d35;--card:#1a2540;--card2:#1f2d4a;--gold:#c9a84c;--gold2:#e8c96d;--gold3:#f5e0a0;--text:#e8e4d9;--text2:#a8a090;--text3:#6a6258;--red:#c0524a;--green:#4a8c6a;--border:rgba(201,168,76,0.2);--border2:rgba(201,168,76,0.08);--shadow:0 8px 32px rgba(0,0,0,0.45);--r:16px;
  --tag-todo:#e08090;--tag-todo-bg:rgba(200,130,150,.2);
  --tag-inc:#4a8c6a;--tag-inc-bg:rgba(74,140,106,.18);
  --tag-exp:#c0524a;--tag-exp-bg:rgba(192,82,74,.18);}
.th-pastel{--bg:#fdf6f0;--bg2:#fef9f5;--bg3:#fff5ee;--card:#fff;--card2:#fef6ef;--gold:#d4845a;--gold2:#e8956e;--gold3:#c06040;--text:#3a2a1a;--text2:#7a5a4a;--text3:#a08070;--border:rgba(212,132,90,0.25);--border2:rgba(212,132,90,0.1);
  --tag-todo:#c0607a;--tag-todo-bg:rgba(192,96,122,.15);
  --tag-inc:#4a7a5a;--tag-inc-bg:rgba(74,122,90,.15);
  --tag-exp:#b04030;--tag-exp-bg:rgba(176,64,48,.15);}
.th-minimal{--bg:#f5f4f0;--bg2:#fff;--bg3:#eeecea;--card:#fff;--card2:#f8f7f5;--gold:#1a1a1a;--gold2:#333;--gold3:#000;--text:#111;--text2:#555;--text3:#999;--border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.05);
  --tag-todo:#555;--tag-todo-bg:rgba(80,80,80,.1);
  --tag-inc:#2a6a3a;--tag-inc-bg:rgba(42,106,58,.12);
  --tag-exp:#8a2020;--tag-exp-bg:rgba(138,32,32,.1);}
/* 따뜻한 파스텔 — 아이보리+살구, 흰색 베이스 */
.th-pastel{--bg:#fefaf6;--bg2:#fff;--bg3:#fdf3ec;--card:#fff;--card2:#fdf6f0;
  --gold:#c87850;--gold2:#dfa070;--gold3:#a85a30;
  --text:#3a2818;--text2:#7a5a40;--text3:#b09070;
  --red:#c05040;--green:#4a7a5a;
  --border:rgba(200,120,80,0.2);--border2:rgba(200,120,80,0.08);
  --tag-todo:#b86070;--tag-todo-bg:rgba(184,96,112,.12);
  --tag-inc:#4a7a5a;--tag-inc-bg:rgba(74,122,90,.13);
  --tag-exp:#a84030;--tag-exp-bg:rgba(168,64,48,.12);}

/* 모던 미니멀 — 순백+연회색 */
.th-minimal{--bg:#f9f9f7;--bg2:#fff;--bg3:#f2f2f0;--card:#fff;--card2:#f7f7f5;
  --gold:#3a3a3a;--gold2:#555;--gold3:#222;
  --text:#1a1a1a;--text2:#5a5a5a;--text3:#9a9a9a;
  --red:#b03030;--green:#3a6a4a;
  --border:rgba(60,60,60,0.14);--border2:rgba(60,60,60,0.06);
  --tag-todo:#606060;--tag-todo-bg:rgba(96,96,96,.1);
  --tag-inc:#3a6a4a;--tag-inc-bg:rgba(58,106,74,.11);
  --tag-exp:#b03030;--tag-exp-bg:rgba(176,48,48,.1);}

/* 라벤더 드림 — 흰색+연보라, 밝고 부드럽게 */
.th-lavender{--bg:#faf8ff;--bg2:#fff;--bg3:#f3efff;--card:#fff;--card2:#f7f4ff;
  --gold:#7a5ab0;--gold2:#9878c8;--gold3:#5a3a90;
  --text:#2a2038;--text2:#6050888;--text3:#9880b0;
  --red:#b04870;--green:#4a7a5a;
  --border:rgba(122,90,176,0.18);--border2:rgba(122,90,176,0.08);
  --tag-todo:#8860b0;--tag-todo-bg:rgba(136,96,176,.13);
  --tag-inc:#4a7a5a;--tag-inc-bg:rgba(74,122,90,.13);
  --tag-exp:#b04870;--tag-exp-bg:rgba(176,72,112,.12);}

/* 민트 브리즈 — 흰색+연민트, 청량하되 순하게 */
.th-mint{--bg:#f5fdf9;--bg2:#fff;--bg3:#eaf8f2;--card:#fff;--card2:#f2fdf8;
  --gold:#288a68;--gold2:#40aa82;--gold3:#186848;
  --text:#0e2820;--text2:#385e50;--text3:#7aaa98;
  --red:#b84840;--green:#288a68;
  --border:rgba(40,138,104,0.18);--border2:rgba(40,138,104,0.08);
  --tag-todo:#388870;--tag-todo-bg:rgba(56,136,112,.13);
  --tag-inc:#288a68;--tag-inc-bg:rgba(40,138,104,.15);
  --tag-exp:#b84840;--tag-exp-bg:rgba(184,72,64,.12);}

/* 로즈 골드 — 흰색+연핑크, 럭셔리하되 산뜻 */
.th-rose{--bg:#fff7f8;--bg2:#fff;--bg3:#ffeff2;--card:#fff;--card2:#fff4f6;
  --gold:#b85878;--gold2:#d07090;--gold3:#983858;
  --text:#2a1018;--text2:#6a3848;--text3:#a87888;
  --red:#a82840;--green:#487a50;
  --border:rgba(184,88,120,0.18);--border2:rgba(184,88,120,0.08);
  --tag-todo:#b85878;--tag-todo-bg:rgba(184,88,120,.13);
  --tag-inc:#487a50;--tag-inc-bg:rgba(72,122,80,.13);
  --tag-exp:#a82840;--tag-exp-bg:rgba(168,40,64,.12);}

/* 슬레이트 블루 — 흰색+연블루, 차분하고 깔끔 */
.th-slate{--bg:#f5f8fc;--bg2:#fff;--bg3:#eaf0f8;--card:#fff;--card2:#f2f6fb;
  --gold:#3858888;--gold2:#5070a0;--gold3:#284878;
  --text:#0e1c2e;--text2:#3a5068;--text3:#7890a8;
  --red:#9a4040;--green:#387858;
  --border:rgba(56,88,136,0.16);--border2:rgba(56,88,136,0.07);
  --tag-todo:#486898;--tag-todo-bg:rgba(72,104,152,.13);
  --tag-inc:#387858;--tag-inc-bg:rgba(56,120,88,.13);
  --tag-exp:#9a4040;--tag-exp-bg:rgba(154,64,64,.12);}

/* 선셋 피치 — 흰색+연살구/피치, 강한 오렌지 제거 */
.th-sunset{--bg:#fff9f5;--bg2:#fff;--bg3:#fff2e8;--card:#fff;--card2:#fff6f0;
  --gold:#c06840;--gold2:#d88058;--gold3:#a04820;
  --text:#2a1808;--text2:#684030;--text3:#a87858;
  --red:#b83020;--green:#488040;
  --border:rgba(192,104,64,0.18);--border2:rgba(192,104,64,0.08);
  --tag-todo:#c07050;--tag-todo-bg:rgba(192,112,80,.13);
  --tag-inc:#488040;--tag-inc-bg:rgba(72,128,64,.13);
  --tag-exp:#b83020;--tag-exp-bg:rgba(184,48,32,.12);}

/* 무드 모카 — 따뜻한 다크, 흰색 살짝 */
.th-mocha{--bg:#1e1612;--bg2:#281e18;--bg3:#302418;--card:#382820;--card2:#402e24;
  --gold:#c89868;--gold2:#dab080;--gold3:#e8c898;
  --text:#f2ece4;--text2:#b8a090;--text3:#806858;
  --red:#c05040;--green:#5a8c6a;
  --border:rgba(200,152,104,0.2);--border2:rgba(200,152,104,0.08);
  --tag-todo:#d09868;--tag-todo-bg:rgba(208,152,104,.18);
  --tag-inc:#5a8c6a;--tag-inc-bg:rgba(90,140,106,.18);
  --tag-exp:#c05040;--tag-exp-bg:rgba(192,80,64,.18);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .4s,color .4s;
  padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);}

/* ── SPLASH ── */
#splash-overlay{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s ease,transform .5s ease;}
#splash-overlay.out{opacity:0;transform:scale(1.04);pointer-events:none;}
.spl-slides-wrap{overflow:hidden;width:100%;max-width:420px;flex:1;display:flex;flex-direction:column;justify-content:center;}
.spl-slides{display:flex;width:300%;transition:transform .4s cubic-bezier(.4,0,.2,1);}
.spl-slide{width:33.333%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 28px;text-align:center;min-height:70vh;}
.spl-icon-box{width:88px;height:88px;border-radius:22px;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 22px;box-shadow:var(--shadow);}
.spl-app-name{font-family:'Playfair Display',serif;font-size:32px;color:var(--gold);margin-bottom:8px;font-weight:400;}
.spl-sub{font-size:12px;color:var(--text3);letter-spacing:2px;margin-bottom:22px;}
.spl-body{font-size:14px;color:var(--text2);line-height:1.85;}
.spl-feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:340px;margin:0 auto 20px;}
.spl-feat{background:var(--card);border:1px solid var(--border2);border-radius:16px;padding:16px 12px;}
.spl-feat-ic{font-size:22px;margin-bottom:8px;}
.spl-feat-nm{font-size:12px;font-weight:600;color:var(--text);}
.spl-feat-ds{font-size:10px;color:var(--text3);margin-top:3px;}
.spl-dots{display:flex;gap:8px;justify-content:center;margin-bottom:14px;}
.spl-dot{height:6px;border-radius:3px;background:var(--border);cursor:pointer;transition:width .3s,background .3s;}
.spl-dot.on{background:var(--gold);}
.spl-next-btn{padding:13px 0;border-radius:14px;border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:15px;font-weight:600;width:100%;max-width:300px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg);transition:transform .2s;}
.spl-next-btn:hover{transform:translateY(-2px);}
.spl-skip{background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer;margin-top:10px;font-family:'Noto Sans KR',sans-serif;}
/* ── 위젯 미리보기 ── */
.widget-mini{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:12px;margin-bottom:10px;max-height:280px;overflow-y:auto;}
.widget-mini-title{font-size:10px;color:var(--gold);letter-spacing:1px;font-weight:600;margin-bottom:8px;}
.w-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.w-cal-wd{text-align:center;font-size:8px;color:var(--text3);padding:2px 0;}
.w-cal-cell{border-radius:4px;padding:2px;min-height:32px;background:var(--bg3);font-size:8px;color:var(--text2);}
.w-cal-cell.wtoday{background:var(--border);border:1px solid var(--gold);color:var(--gold);font-weight:700;}
.w-event{border-radius:2px;font-size:6px;color:#fff;padding:1px 3px;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
/* ── 반응형 ── */
@media(min-width:640px){.page{padding:calc(80px + env(safe-area-inset-top)) 40px 40px;}}
@media(min-width:900px){
  body{display:flex;justify-content:center;background:var(--bg);}
  .app{max-width:100%;width:100%;min-height:100vh;box-shadow:none;}
  .nav{max-width:100%;padding-left:48px;padding-right:48px;}
  .page{padding:calc(80px + env(safe-area-inset-top)) 80px 60px;}
  .cover-inner{max-width:600px;}
  .cat-grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));max-width:1100px;margin:0 auto;}
  .mo-grid{grid-template-columns:repeat(4,1fr);}
  .yr-grid{grid-template-columns:repeat(5,1fr);}
  .bud-summary{grid-template-columns:repeat(4,1fr);}
  .day-grid{grid-template-columns:repeat(7,1fr);}
  .pg-hdr{max-width:1100px;margin-left:auto;margin-right:auto;}
  .daily-form,.memo-wrap,.achieve-wrap,.goals-wrap,.bud-wrap{max-width:860px;margin-left:auto;margin-right:auto;}
}
@media(max-width:500px){
  .bud-summary{grid-template-columns:1fr 1fr;}
  .goal-vals{grid-template-columns:1fr 1fr;}
  .spl-grid{grid-template-columns:1fr;}
  .yr-grid{grid-template-columns:repeat(3,1fr);}
  .mo-grid{grid-template-columns:repeat(3,1fr);}
  .cat-grid{grid-template-columns:repeat(2,1fr);}
  .page{padding:calc(70px + env(safe-area-inset-top)) 16px 40px;}
  .nav{padding-left:16px;padding-right:16px;}
  .cover-yr{font-size:clamp(5rem,22vw,9rem);}
  .cat-card{padding:20px 14px 16px;}
}
@media(min-width:501px) and (max-width:899px){
  .cat-grid{grid-template-columns:repeat(3,1fr);}
  .mo-grid{grid-template-columns:repeat(4,1fr);}
  .yr-grid{grid-template-columns:repeat(4,1fr);}
  .page{padding:calc(75px + env(safe-area-inset-top)) 24px 40px;}
}
.install-guide{background:var(--card2);border:1px dashed var(--gold);border-radius:14px;padding:16px;margin-top:14px;}
.install-guide-title{font-size:12px;font-weight:700;color:var(--gold);margin-bottom:10px;}
.install-step{font-size:12px;color:var(--text2);line-height:1.9;}
.install-step b{color:var(--gold);}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--card2);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--gold)}
/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:12px 20px;padding-top:calc(12px + env(safe-area-inset-top));background:var(--bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border2);}
.nav-logo{font-family:'Playfair Display',serif;color:var(--gold);font-size:1.15rem;cursor:pointer;letter-spacing:1px;}
.nb{padding:7px 14px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--text2);cursor:pointer;font-size:.82rem;transition:all .2s;font-family:'Noto Sans KR',sans-serif;}
.nb:hover,.nb.on{background:var(--gold);color:var(--bg);border-color:var(--gold);}
/* COVER */
.cover{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:linear-gradient(150deg,var(--bg) 0%,var(--bg3) 70%);padding-top:env(safe-area-inset-top);}
.cover::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 15% 25%,rgba(201,168,76,.07) 0,transparent 55%),radial-gradient(ellipse at 85% 75%,rgba(74,111,165,.08) 0,transparent 55%);}
.cover-inner{position:relative;z-index:1;text-align:center;width:90%;max-width:480px;}
.cover-ornament{font-size:1.5rem;color:var(--gold);opacity:.35;letter-spacing:10px;margin-bottom:24px;}
.cover-yr{font-family:'Playfair Display',serif;font-size:clamp(6.5rem,24vw,12rem);color:var(--gold);line-height:.9;letter-spacing:-4px;text-shadow:0 0 100px rgba(201,168,76,.25);}
.cover-sub{font-family:'Cormorant Garamond',serif;font-size:clamp(.7rem,1.8vw,1rem);color:var(--text3);letter-spacing:6px;text-transform:uppercase;margin:6px 0 20px;}
.cover-line{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto 28px;}
.cover-memo{width:100%;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:.95rem;text-align:center;padding:10px 4px;outline:none;resize:none;transition:border-color .3s;}
.cover-memo:focus{border-bottom-color:var(--gold);}
.cover-memo::placeholder{color:var(--text3);}
.cover-yr-nav{display:flex;align-items:center;justify-content:center;gap:14px;margin:18px 0;}
.yr-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.yr-btn:hover{border-color:var(--gold);color:var(--gold);}
.cover-start{margin-top:16px;padding:18px 64px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg);border:none;border-radius:14px;font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:1.15rem;cursor:pointer;letter-spacing:4px;text-transform:uppercase;transition:all .3s;position:relative;box-shadow:0 6px 24px rgba(201,168,76,.3);}
.cover-start::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:0;height:1px;background:var(--gold);transition:width .35s ease;}
.cover-start:hover{transform:translateY(-3px);box-shadow:0 10px 32px rgba(201,168,76,.4);}
.cover-icons{position:absolute;top:20px;right:20px;display:flex;gap:10px;z-index:10;}
.icon-btn{width:42px;height:42px;border-radius:50%;background:rgba(201,168,76,.1);border:1px solid var(--border);color:var(--gold);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.icon-btn:hover{background:rgba(201,168,76,.2);}
.panel{position:absolute;top:72px;right:20px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;z-index:300;box-shadow:var(--shadow);min-width:240px;animation:fadeUp .25s ease;}
.panel-title{font-size:.7rem;color:var(--gold);letter-spacing:3px;text-transform:uppercase;margin-bottom:14px;}
.theme-row{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:10px;cursor:pointer;transition:background .2s;margin-bottom:2px;}
.theme-row:hover{background:var(--card2);}
.theme-row.on{background:var(--card2);}
.theme-dot-sm{width:18px;height:18px;border-radius:50%;flex-shrink:0;border:2px solid transparent;transition:border-color .2s;}
.theme-row.on .theme-dot-sm{border-color:var(--gold);}
.theme-lbl{font-size:.85rem;color:var(--text2);}
.theme-row.on .theme-lbl{color:var(--gold);}
.search-wrap{display:flex;gap:6px;margin-bottom:10px;}
.search-in{flex:1;padding:9px 12px;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:.88rem;outline:none;transition:border-color .3s;}
.search-in:focus{border-color:var(--gold);}
.search-go{padding:9px 14px;background:var(--gold);border:none;border-radius:10px;color:var(--bg);font-weight:700;cursor:pointer;font-size:.85rem;}
.search-res{max-height:220px;overflow-y:auto;}
.search-item{padding:9px 6px;border-bottom:1px solid var(--border2);cursor:pointer;border-radius:6px;transition:all .15s;}
.search-item:hover{background:var(--card2);padding-left:10px;}
.search-date{font-size:.68rem;color:var(--gold);margin-bottom:3px;}
.search-txt{font-size:.82rem;color:var(--text2);}
/* CATEGORY */
.cat-page{min-height:100vh;background:linear-gradient(160deg,var(--bg) 0%,var(--bg3) 100%);padding:78px 20px 48px;display:flex;flex-direction:column;align-items:center;}
.cat-head{text-align:center;margin-bottom:44px;}
.cat-eyebrow{font-family:'Cormorant Garamond',serif;font-size:.72rem;letter-spacing:8px;color:var(--gold);opacity:.7;text-transform:uppercase;margin-bottom:10px;}
.cat-h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,5vw,2.6rem);color:var(--text);line-height:1.1;}
.cat-h1 span{color:var(--gold);}
.cat-line{width:36px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:16px auto 0;}
.cat-grid{width:100%;max-width:720px;display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;}
.cat-card{position:relative;overflow:hidden;background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:26px 20px 22px;cursor:pointer;transition:all .32s cubic-bezier(.4,0,.2,1);}
.cat-card:hover{transform:translateY(-7px);}
.cat-glow{position:absolute;top:-24px;right:-24px;width:90px;height:90px;border-radius:50%;transition:transform .35s,opacity .35s;opacity:.55;}
.cat-icon{font-size:1.75rem;margin-bottom:14px;transition:transform .3s;display:inline-block;}
.cat-card:hover .cat-icon{transform:scale(1.18);}
.cat-name{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:600;margin-bottom:4px;transition:color .3s;}
.cat-en{font-size:.65rem;letter-spacing:2.5px;text-transform:uppercase;color:var(--text3);margin-bottom:9px;}
.cat-desc{font-size:.76rem;color:var(--text3);line-height:1.55;transition:color .3s;}
.cat-card:hover .cat-desc{color:var(--text2);}
.cat-arrow{position:absolute;bottom:18px;right:18px;font-size:.95rem;transition:all .3s;color:var(--text3);}
.cat-card:hover .cat-arrow{transform:translateX(4px);}
.cat-today{margin-top:32px;font-size:.72rem;color:var(--text3);letter-spacing:2px;}
/* PAGE */
.page{min-height:100vh;padding:calc(70px + env(safe-area-inset-top)) 20px 40px;background:var(--bg);}
.back-btn{padding:8px 16px;background:transparent;border:1px solid var(--border);border-radius:20px;color:var(--text2);cursor:pointer;font-size:.84rem;transition:all .2s;font-family:'Noto Sans KR',sans-serif;}
.back-btn:hover{border-color:var(--gold);color:var(--gold);}
.pg-title{font-family:'Playfair Display',serif;font-size:1.75rem;color:var(--gold);}
.pg-hdr{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
/* CALENDAR */
.cal-nav-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.cal-nav-btn{width:34px;height:34px;border-radius:50%;background:var(--card);border:1px solid var(--border2);color:var(--text);cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.cal-nav-btn:hover{border-color:var(--gold);color:var(--gold);}
.cal-nav-lbl{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--text2);flex:1;}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;}
.cal-dow-cell{text-align:center;font-size:.68rem;font-weight:600;padding:4px 0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-cell{aspect-ratio:1;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .18s;position:relative;border:1px solid transparent;background:var(--card);gap:1px;}
.cal-cell:hover{border-color:var(--gold);background:var(--card2);}
.cal-cell.tod{border-color:var(--gold)!important;background:rgba(201,168,76,.13);}
.cal-cell.sel{background:rgba(201,168,76,.2)!important;border-color:var(--gold)!important;transform:scale(1.06);}
.cal-cell.emp{background:transparent;border:none;cursor:default;}
.cal-cell.sun .day-n{color:#e06060;}
.cal-cell.sat .day-n{color:#6090e0;}
.day-n{font-size:.82rem;font-weight:500;}
.cell-em{font-size:.6rem;line-height:1;}
.cell-dot{width:5px;height:5px;border-radius:50%;position:absolute;bottom:3px;}
/* PREVIEW */
.preview{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px 16px;margin-top:18px;animation:fadeUp .25s ease;}
.preview-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.preview-date{font-family:'Playfair Display',serif;font-size:1.7rem;color:var(--gold);}
.preview-sub{font-size:.78rem;color:var(--text3);margin-top:2px;}
.preview-open{padding:8px 18px;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:20px;color:var(--bg);font-weight:700;cursor:pointer;font-size:.8rem;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;}
.preview-sec{margin-bottom:12px;}
.preview-lbl{font-size:.65rem;color:var(--gold);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:6px;}
.preview-ebar{background:var(--bg2);border-radius:4px;height:5px;overflow:hidden;margin-bottom:2px;}
.preview-efill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--gold),var(--gold2));}
.preview-tag{display:inline-block;font-size:.75rem;padding:3px 10px;border-radius:20px;margin:2px;}
.preview-quote{font-size:.82rem;color:var(--text2);line-height:1.65;border-left:2px solid var(--border);padding-left:10px;}
/* DAILY */
.sec-card{background:var(--card);border:1px solid var(--border2);border-radius:var(--r);padding:18px 16px;margin-bottom:14px;}
.sec-title{font-size:.68rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border2);}
.todo-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;}
.todo-chk{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);background:transparent;cursor:pointer;flex-shrink:0;margin-top:3px;display:flex;align-items:center;justify-content:center;font-size:.7rem;transition:all .2s;}
.todo-chk.on{background:var(--gold);border-color:var(--gold);color:var(--bg);}
.todo-in{flex:1;background:transparent;border:none;border-bottom:1px solid var(--border2);color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none;padding:2px 0;resize:none;transition:border-color .2s;font-size:.9rem;}
.todo-in:focus{border-bottom-color:var(--gold);}
.todo-in.done{text-decoration:line-through;color:var(--text3);}
.fs-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.fs-btn{width:24px;height:24px;border-radius:50%;background:var(--card2);border:1px solid var(--border2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.8rem;transition:all .2s;}
.fs-btn:hover{border-color:var(--gold);color:var(--gold);}
.fs-lbl{font-size:.7rem;color:var(--text3);}
.add-btn{width:100%;padding:7px;border:1px dashed var(--border2);background:transparent;color:var(--text3);cursor:pointer;border-radius:8px;font-size:.8rem;margin-top:8px;transition:all .2s;font-family:'Noto Sans KR',sans-serif;}
.add-btn:hover{border-color:var(--gold);color:var(--gold);}
.spl-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.spl-item{text-align:center;}
.spl-icon{font-size:1.4rem;margin-bottom:6px;}
.spl-in{width:100%;background:transparent;border:none;border-bottom:1px solid var(--border2);color:var(--text);font-family:'Noto Sans KR',sans-serif;text-align:center;outline:none;padding:4px 0;font-size:.82rem;transition:border-color .2s;}
.spl-in:focus{border-bottom-color:var(--gold);}
.habit-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.habit-chk{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.8rem;transition:all .2s;}
.habit-chk.on{background:var(--green);border-color:var(--green);}
.habit-nm{flex:1;background:transparent;border:none;border-bottom:1px solid transparent;color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none;font-size:.88rem;padding:2px 0;transition:border-color .2s;}
.habit-nm:focus{border-bottom-color:var(--border);}
.grat-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:8px;}
.grat-num{color:var(--gold);font-size:.8rem;font-family:'Playfair Display',serif;margin-top:3px;flex-shrink:0;}
.grat-in{flex:1;background:transparent;border:none;border-bottom:1px solid var(--border2);color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none;padding:2px 0;font-size:.88rem;transition:border-color .2s;}
.grat-in:focus{border-bottom-color:var(--gold);}
.memo-ta{width:100%;min-height:140px;background:transparent;border:none;color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none;resize:vertical;line-height:1.8;padding:4px 0;font-size:.9rem;}
.w-btn{padding:7px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;cursor:pointer;font-size:1rem;transition:all .2s;margin:2px;}
.w-btn.on{background:var(--card2);border-color:var(--gold);}
.e-btn{padding:7px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;cursor:pointer;font-size:1rem;transition:all .2s;margin:2px;}
.e-btn.on{background:var(--card2);border-color:var(--gold);transform:scale(1.12);}
.energy-lbl{font-size:.74rem;color:var(--text3);margin-bottom:6px;}
.energy-sl{width:100%;appearance:none;-webkit-appearance:none;height:6px;border-radius:3px;background:var(--card2);outline:none;}
.energy-sl::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--gold);cursor:pointer;}
/* CANVAS */
.canvas-wrap{border:1px solid var(--border2);border-radius:10px;overflow:hidden;}
.canvas-tools{display:flex;gap:6px;padding:8px;background:var(--card2);flex-wrap:wrap;align-items:center;}
.ct-btn{padding:4px 10px;border-radius:12px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-size:.74rem;transition:all .2s;font-family:'Noto Sans KR',sans-serif;}
.ct-btn:hover,.ct-btn.on{background:var(--gold);color:var(--bg);border-color:var(--gold);}
.c-sw{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .2s;flex-shrink:0;}
.c-sw:hover,.c-sw.on{transform:scale(1.35);border-color:#fff;}
/* BUDGET */
.bud-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px;}
.bud-card{background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:16px 10px;text-align:center;}
.bud-lbl{font-size:.68rem;color:var(--text3);margin-bottom:6px;letter-spacing:1px;}
.bud-amt{font-family:'Playfair Display',serif;font-size:1.2rem;}
.bud-amt.inc{color:var(--green)}.bud-amt.exp{color:var(--red)}.bud-amt.bal{color:var(--gold)}
.bud-item{display:flex;align-items:center;gap:10px;background:var(--card);border-radius:10px;padding:10px 12px;margin-bottom:8px;}
.bud-form{background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:16px;margin-bottom:16px;}
.type-tog{display:flex;border-radius:8px;overflow:hidden;margin-bottom:10px;}
.type-btn{flex:1;padding:9px;border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:.84rem;transition:all .2s;background:var(--card2);color:var(--text2);}
.type-btn.on.inc{background:var(--green);color:#fff;}
.type-btn.on.exp{background:var(--red);color:#fff;}
.fi{width:100%;padding:10px 12px;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:.88rem;outline:none;transition:border-color .3s;margin-bottom:8px;}
.fi:focus{border-color:var(--gold);}
.sub-btn{width:100%;padding:12px;border:none;border-radius:8px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--bg);font-weight:700;cursor:pointer;font-size:.9rem;font-family:'Noto Sans KR',sans-serif;transition:transform .2s;}
.sub-btn:hover{transform:translateY(-2px);}
/* GOALS */
.goal-card{background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:16px;margin-bottom:12px;}
.goal-nm{flex:1;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:1rem;font-weight:500;outline:none;padding:4px 0;transition:border-color .2s;}
.goal-nm:focus{border-bottom-color:var(--gold);}
.goal-vals{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px;}
.goal-n{width:100%;padding:8px;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:.9rem;outline:none;text-align:center;transition:border-color .2s;}
.goal-n:focus{border-color:var(--gold);}
.prog-wrap{background:var(--bg2);border-radius:20px;height:11px;overflow:hidden;margin-bottom:6px;}
.prog-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width .6s ease;}
.prog-row{display:flex;justify-content:space-between;font-size:.72rem;color:var(--text3);}
.prog-pct{color:var(--gold);font-weight:700;}
/* ACHIEVE */
.ach-card{background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:16px;margin-bottom:12px;}
.ach-ti{flex:1;background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:1rem;font-weight:500;outline:none;padding:4px 0;}
.ach-pct{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--gold);}
.day-sq{width:13px;height:13px;border-radius:2px;cursor:pointer;transition:transform .15s;border:1px solid rgba(255,255,255,.04);}
.day-sq:hover{transform:scale(1.5);}
/* GRIDS */
.yr-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.yr-card{background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:all .22s;font-size:1.05rem;}
.mo-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.mo-card{background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:18px 10px;text-align:center;cursor:pointer;transition:all .22s;}
.mo-card:hover{background:var(--card2);border-color:var(--gold);}
.mo-num{font-family:'Playfair Display',serif;font-size:1.75rem;color:var(--gold);}
.mo-nm{font-size:.72rem;color:var(--text3);margin-top:4px;}
.mo-dots{display:flex;gap:3px;justify-content:center;margin-top:8px;flex-wrap:wrap;}
.mdot{width:7px;height:7px;border-radius:50%;}
/* POPUP */
.popup{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;display:flex;gap:6px;flex-wrap:wrap;box-shadow:var(--shadow);margin-bottom:10px;}
/* MEMO */
.memo-ta-big{width:100%;min-height:65vh;background:var(--card);border:1px solid var(--border2);border-radius:var(--r);padding:20px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:.95rem;line-height:1.9;outline:none;resize:none;}
.memo-ta-big::placeholder{color:var(--text3);}

/* 스와이프 뒤로가기 */
.app{touch-action:pan-y;}
/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--gold);color:var(--bg);padding:10px 26px;border-radius:25px;font-size:.87rem;font-weight:700;z-index:500;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:fadeUp .3s ease;white-space:nowrap;}
.daily-date-txt{font-family:'Playfair Display',serif;font-size:2rem;color:var(--gold);}
.daily-dow{color:var(--text3);font-size:.88rem;margin-top:2px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp .4s ease;}

/* ══ 페이지 전환 모션 ══ */
.page-enter{animation:pageSlideIn .32s cubic-bezier(.4,0,.2,1) both;}
.page-exit{animation:pageSlideOut .28s cubic-bezier(.4,0,.2,1) both;}
.page-enter-left{animation:pageSlideInLeft .32s cubic-bezier(.4,0,.2,1) both;}
.page-exit-right{animation:pageSlideOutRight .28s cubic-bezier(.4,0,.2,1) both;}
@keyframes pageSlideIn{from{opacity:0;transform:translateX(32px)}to{opacity:1;transform:none}}
@keyframes pageSlideOut{from{opacity:1;transform:none}to{opacity:0;transform:translateX(-32px)}}
@keyframes pageSlideInLeft{from{opacity:0;transform:translateX(-32px)}to{opacity:1;transform:none}}
@keyframes pageSlideOutRight{from{opacity:1;transform:none}to{opacity:0;transform:translateX(32px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* 카드 stagger */
.stagger-1{animation:fadeUp .35s .04s both;}
.stagger-2{animation:fadeUp .35s .08s both;}
.stagger-3{animation:fadeUp .35s .12s both;}
.stagger-4{animation:fadeUp .35s .16s both;}
.stagger-5{animation:fadeUp .35s .20s both;}

/* 버튼 스프링 */
.spl-next-btn,.back-btn,.nav-btn,.cat-item,.day-cell{transition:transform .18s cubic-bezier(.34,1.56,.64,1)!important;}
.spl-next-btn:active,.back-btn:active,.nav-btn:active{transform:scale(.96)!important;}
.cat-item:active,.day-cell:active{transform:scale(.94)!important;}

/* ══ 구글 로그인 오버레이 ══ */
#fb-login-overlay{
  position:fixed;inset:0;z-index:10000;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px 28px;
  animation:fadeUp .45s cubic-bezier(.4,0,.2,1) both;
}
.fb-login-logo{font-family:'Playfair Display',serif;font-size:36px;color:var(--gold);margin-bottom:6px;letter-spacing:1px;}
.fb-login-sub{font-size:12px;color:var(--text3);letter-spacing:2px;margin-bottom:40px;}
.fb-login-desc{font-size:14px;color:var(--text2);text-align:center;line-height:1.85;margin-bottom:36px;max-width:280px;}
.fb-google-btn{
  display:flex;align-items:center;gap:12px;
  background:#fff;border:1.5px solid #E0E0E0;border-radius:14px;
  padding:15px 28px;font-size:15px;font-weight:700;cursor:pointer;
  color:#3C4043;font-family:'Noto Sans KR',sans-serif;
  box-shadow:0 4px 20px rgba(0,0,0,.1);width:100%;max-width:300px;justify-content:center;
  transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;
}
.fb-google-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.15);}
.fb-google-btn:active{transform:scale(.97);}
.fb-skip{background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer;margin-top:16px;font-family:'Noto Sans KR',sans-serif;text-decoration:underline;}
.fb-sync-badge{
  position:fixed;top:calc(env(safe-area-inset-top,0px)+8px);right:16px;
  z-index:500;background:var(--card);border:1px solid var(--border);
  border-radius:20px;padding:5px 12px;font-size:11px;color:var(--text2);
  display:flex;align-items:center;gap:6px;box-shadow:var(--shadow);
  transition:opacity .3s;
}
.fb-sync-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);}
.fb-sync-dot.ok{background:#4a8c6a;}
.fb-sync-dot.sync{background:var(--gold);animation:syncPulse 1s infinite;}
.fb-sync-dot.off{background:var(--text3);}
@keyframes syncPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}

/* ══ 위젯 ══ */
.widget-section{margin-top:20px;}
.widget-row{display:flex;gap:10px;flex-wrap:wrap;}
.widget-small{
  flex:1;min-width:140px;background:var(--card);border:1px solid var(--border);
  border-radius:20px;padding:14px;box-shadow:var(--shadow);
  font-family:'Noto Sans KR',sans-serif;
}
.widget-medium{
  width:100%;background:var(--card);border:1px solid var(--border);
  border-radius:22px;padding:16px;box-shadow:var(--shadow);
}
.wg-title{font-size:9px;color:var(--gold);letter-spacing:1.5px;font-weight:700;margin-bottom:8px;text-transform:uppercase;}
.wg-date{font-family:'Playfair Display',serif;font-size:28px;color:var(--gold);line-height:1;}
.wg-dow{font-size:10px;color:var(--text2);margin-top:2px;}
.wg-mood{font-size:26px;margin-bottom:4px;}
.wg-mood-lbl{font-size:10px;color:var(--text2);}
.wg-budget{display:flex;flex-direction:column;gap:4px;}
.wg-budget-row{display:flex;justify-content:space-between;font-size:11px;}
.wg-budget-lbl{color:var(--text2);}
.wg-budget-val{font-weight:700;}
.wg-inc{color:var(--green);}
.wg-exp{color:var(--red);}
.wg-tasks{display:flex;flex-direction:column;gap:5px;}
.wg-task{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text2);}
.wg-task-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0;}
.wg-task.done .wg-task-dot{background:var(--green);}
.wg-task.done span{text-decoration:line-through;opacity:.5;}
.wg-habit-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:4px;}
.wg-habit-dot{aspect-ratio:1;border-radius:3px;background:var(--border2);}
.wg-habit-dot.done{background:var(--gold);}
.widget-install-hint{font-size:11px;color:var(--text3);text-align:center;margin-top:12px;line-height:1.7;}

/* ══ 업데이트 배너 ══ */
#update-banner{
  position:fixed;top:0;left:0;right:0;z-index:9000;
  background:var(--gold);color:var(--bg);

<script>
// PWA 설치 프롬프트 저장
let _installPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();
  _installPrompt=e;
  const btn=document.getElementById('pwa-install-btn');
  if(btn) btn.style.display='block';
});
window.addEventListener('appinstalled',()=>{ console.log('My Diary installed!'); });

// ── 업데이트 배너 ──
document.body.insertAdjacentHTML('afterbegin','<div id="update-banner">🎉 새 버전이 있어요! <button onclick="applyUpdate()">지금 업데이트</button></div>');

function applyUpdate(){
  navigator.serviceWorker?.ready.then(r=>{ r.waiting?.postMessage({type:'SKIP_WAITING'}); location.reload(); });
}

// ── 서비스워커 등록 ──
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/sw.js').then(reg=>{
      reg.addEventListener('updatefound',()=>{
        const nw=reg.installing;
        nw?.addEventListener('statechange',()=>{
          if(nw.state==='installed'&&navigator.serviceWorker.controller){
            document.getElementById('update-banner')?.classList.add('show');
          }
        });
      });
      setInterval(()=>reg.update(), 30*60*1000);
      navigator.serviceWorker.addEventListener('controllerchange',()=>location.reload());
    }).catch(()=>{});
  });
}
console.log('My Diary v11 — Firebase + PWA Ready');
</script>
